name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install WiX v4 CLI
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      # Extract version from tag (strip leading 'v')
      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build screensaver .scr (release)
      - name: Build screensaver
        run: |
          cargo build -p inat-scr-windows --release
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item target\release\FieldGlass.exe dist\windows\FieldGlass.scr

      # Build companion app (Tauri release)
      - name: Build companion app
        working-directory: crates/inat-companion
        run: cargo tauri build

      # Build MSI installer
      - name: Build MSI installer
        run: |
          wix build installer\windows\Product.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d "ProductVersion=${{ steps.version.outputs.version }}.0" `
            -d "ScrPath=dist\windows\FieldGlass.scr" `
            -d "CompanionPath=target\release\inat-companion.exe" `
            -d "IconPath=crates\inat-companion\icons\icon.ico" `
            -d "LicensePath=installer\windows\License.rtf" `
            -o "dist\windows\FieldGlass-${{ steps.version.outputs.version }}.msi"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/FieldGlass-${{ steps.version.outputs.version }}.msi
            dist/windows/FieldGlass.scr
          generate_release_notes: true
